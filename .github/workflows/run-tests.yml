name: Run Tests
on:
  pull_request:
    types: [review_requested, synchronize, labeled]
  push:
    branches:
      - "main"
permissions:
  issues: write
  pull-requests: write

jobs:
  run-tests:
    if: |
      (github.event.action == 'review_requested' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ci-testing') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'ci-testing'))) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/github-script@v6
        name: Set 'ci-testing' label
        if: github.event.action == 'review_requested'
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["ci-testing"]
            })
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'packages/plgg/package-lock.json'

      # Fail the PR if a direct vite dep/config/build-import is reintroduced.
      # Same canonical gate scripts/check-all.sh runs locally — no duplicated
      # logic, scoped to exclude the guide's transitive VitePress.
      - name: Gate — no direct vite
        run: ./scripts/gate-vite.sh

      - name: Install dependencies
        run: npm ci
        working-directory: packages/plgg

      # plgg's specs now import the plgg-test runner, so plgg's type-check and
      # tests need plgg-test's built dist (its `types` entry). plgg-test in turn
      # depends on plgg's dist, so build plgg first, then install + build
      # plgg-test, before running plgg's tsc/test/coverage below.
      - name: Build plgg (dependency of plgg-test)
        run: npm run build
        working-directory: packages/plgg

      - name: Install plgg-test dependencies
        run: npm ci
        working-directory: packages/plgg-test

      - name: Build plgg-test (provides the test-runner types/runtime for plgg)
        run: npm run build
        working-directory: packages/plgg-test

      - name: Run TypeScript compilation check
        run: npx tsc --noEmit
        working-directory: packages/plgg
        
      - name: Run tests
        run: npm test
        working-directory: packages/plgg
        
      - name: Build library
        run: npm run build
        working-directory: packages/plgg
        
      - name: Run tests with coverage
        run: npm run coverage
        working-directory: packages/plgg
