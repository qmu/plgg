name: Deploy Guide

# Build the plgg-press guide (packages/guide) — including the auto-generated,
# per-package API reference — and publish it to GitHub Pages.
#
# Independent of the CalVer release pipeline (prepare-release/release): the docs
# follow the code, so this runs on any push to main that touches the packages or
# the guide itself, plus on-demand via workflow_dispatch.
on:
  push:
    branches: ["main"]
    paths:
      - "packages/**"
      - ".github/workflows/deploy-guide.yml"
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: deploy-guide
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      # The API generator reads each package's source with its own tsconfig;
      # cross-package types resolve through the `file:` dist symlinks, so every
      # package must be built first, in dependency order (same order as
      # workloads/development/Dockerfile, extended to the full family).
      # plgg-test is included so `npm ci` provides the @types/node +
      # typescript its source (e.g. src/Resolve/hook.ts) needs when TypeDoc
      # generates its API reference; it depends only on plgg, so it follows it.
      # Builds run on the in-house bundler now — pure JS, no rolldown, no native
      # binding — so the committed locks are platform-neutral and `npm ci`
      # installs deterministically on this linux runner. The former
      # `rm -f package-lock.json` workaround (a darwin-only @rolldown/binding
      # skew that broke install here) is retired with vite itself.
      # The in-house bundler imports typescript from its own path; the `file:`
      # link doesn't install plgg-bundle's node_modules, so install the build
      # tool's deps once before the loop builds every package through it.
      - name: Install build-tool (plgg-bundle) dependencies
        run: npm ci
        working-directory: packages/plgg-bundle

      # plgg-highlight imports typescript from its OWN path (same clean-runner
      # masking as plgg-bundle): the `file:` link doesn't install its
      # node_modules, so install them once before the loop. plgg-highlight is
      # reached transitively via plgg-press, whose build needs the highlighter.
      - name: Install plgg-highlight dependencies
        run: npm ci
        working-directory: packages/plgg-highlight

      - name: Build package dists (dependency order)
        run: |
          set -e
          for pkg in plgg plgg-test plgg-http plgg-router plgg-view plgg-kit \
                     plgg-server plgg-fetch plgg-sql plgg-foundry \
                     plgg-md plgg-highlight plgg-press; do
            echo "::group::build $pkg"
            (cd "packages/$pkg" && npm ci && npm run build)
            echo "::endgroup::"
          done

      - name: Build the guide (plgg-press)
        # DOCS_BASE makes links resolve under the project Pages path.
        env:
          DOCS_BASE: /plgg/
        run: |
          npm ci
          npx plgg-press build --config site.config.ts --contentDir . --outDir dist
        working-directory: packages/guide

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/guide/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
