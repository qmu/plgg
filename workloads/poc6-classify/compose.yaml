# PoC 6 workload — non-tree file classification —
# packages/plgg-poc6-classify on host port 5189, the
# cloudflared tunnel route for plgg-poc6.qmu.dev.
#
#   scripts/serve-poc.sh poc6-classify
#
# SINGLE-process recipe (the PoC 3/4b/5 shape): the shell
# server classifies the corpus copy in-process and serves
# the page index; the three variants navigate it
# client-side. There is no internal doc server and no write
# seam. Artifacts (the bundle + the seeded corpus copy) are
# HOST-built; the container runs the serve entry against the
# mounted repo, auto-seeding content/ on first run. Build
# them first from the package:
#
#   npm run build && npm run seed-content
#
# OPENAI_API_KEY comes from the HOST env (serve-poc.sh
# sources the repo-root .env; an explicit prefix still
# overrides) — never the repo. Without it the PoC serves its
# honest "assistant not configured" state; the deterministic
# query path works regardless.
services:
  poc6-classify:
    image: node:22-slim
    working_dir: /app/packages/plgg-poc6-classify
    # Auto-seed the git-ignored content/ copy on first run
    # (it persists on the mounted host tree), then serve.
    command:
      - "sh"
      - "-c"
      - "[ -d content ] || npm run seed-content; exec node src/entrypoints/serve.ts"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "5189:5173"
    volumes:
      - ../..:/app
