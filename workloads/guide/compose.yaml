# Serve the plgg family guide (plggpress) with hot-reload
# in one command:
#
#   docker compose -f workloads/guide/compose.yaml up --build
#
# then open http://localhost:5181
# (host port 5181 matches the cloudflared tunnel route
# for plgg-guide.qmu.dev; the container serves 5173)
services:
  guide:
    build:
      # Build context is the repo root so the Dockerfile
      # can reach every package.
      context: ../..
      dockerfile: workloads/guide/Dockerfile
    ports:
      - "5181:5173"
    volumes:
      # Mount the repo for live editing — editing guide
      # Markdown OR plggpress theme `.ts` hot-reloads the
      # dev server (the toolchain re-evaluates changed source
      # across the package boundary; see bundle.config.ts).
      # plggpress's sibling dists are (re)built onto THIS
      # mounted tree by the entrypoint, after the mount is
      # live, so they are not hidden by it.
      - ../..:/app
      # Isolate every node_modules the entrypoint installs
      # into: anonymous volumes keep the container's deps
      # (linux/arm binaries + the file: symlink graph) off
      # the host repo, so the container is reproducible
      # regardless of the host's node_modules state and
      # never clobbers a host install on another arch. Each
      # `file:` package needs its OWN node_modules (file:
      # links do not cascade), and plgg-highlight's holds
      # the typescript it resolves at runtime.
      - /app/packages/plgg/node_modules
      - /app/packages/plgg-cli/node_modules
      - /app/packages/plgg-http/node_modules
      - /app/packages/plgg-view/node_modules
      - /app/packages/plgg-md/node_modules
      - /app/packages/plgg-highlight/node_modules
      - /app/packages/plgg-server/node_modules
      - /app/packages/plggpress/node_modules
      - /app/packages/plgg-bundle/node_modules
      - /app/packages/guide/node_modules
