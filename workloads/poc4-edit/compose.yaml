# PoC 4 workload — agent file edits with live hot reload
# over a surviving Realtime session
# (packages/plgg-poc4-edit) on host port 5187, the
# cloudflared tunnel route for plgg-poc4.qmu.dev.
#
#   OPENAI_API_KEY=… scripts/serve-poc.sh poc4-edit
#
# Guide-style recipe (NOT the host-built poc3 one): the
# container installs + builds on the mounted tree and
# runs TWO processes — the internal plggpress dev server
# and the public shell server (see dev-entrypoint.sh).
# OPENAI_API_KEY comes from the HOST env, never the repo;
# without it the PoC serves its honest "assistant not
# configured" state.
services:
  poc4-edit:
    build:
      # Build context is the repo root so the Dockerfile
      # can reach every package.
      context: ../..
      dockerfile: workloads/poc4-edit/Dockerfile
    ports:
      - "5187:5173"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # Mount the repo for live judging: the agent's
      # edits land in packages/plgg-poc4-edit/content
      # (git-ignored) on the HOST tree, visible to the
      # developer's editor while the container serves.
      - ../..:/app
      # Isolate every node_modules the entrypoint
      # installs into: anonymous volumes keep the
      # container's deps (linux/arm binaries + the file:
      # symlink graph) off the host repo. Each `file:`
      # package needs its OWN node_modules (file: links
      # do not cascade); plgg-highlight's holds the
      # typescript it resolves at runtime.
      - /app/packages/plgg/node_modules
      - /app/packages/plgg-cli/node_modules
      - /app/packages/plgg-http/node_modules
      - /app/packages/plgg-view/node_modules
      - /app/packages/plgg-md/node_modules
      - /app/packages/plgg-highlight/node_modules
      - /app/packages/plgg-server/node_modules
      - /app/packages/plggpress/node_modules
      - /app/packages/plgg-bundle/node_modules
      - /app/packages/plgg-kit/node_modules
      - /app/packages/plgg-poc1-search/node_modules
      - /app/packages/plgg-poc4-edit/node_modules
